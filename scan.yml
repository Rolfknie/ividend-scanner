name: Daily Dividend Scan

on:
  schedule:
    # Runs at 06:00 UTC every day (~07:00/08:00 Swiss time depending on DST).
    # Change the cron expression to whatever time you prefer.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you also trigger it manually from the GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scanner
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python screener.py

      - name: Commit updated results
        run: |
          git config user.name "dividend-scanner-bot"
          git config user.email "actions@github.com"
          git add data/results.json
          git diff --quiet --cached || git commit -m "Update scan results $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
